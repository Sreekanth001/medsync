services:
  - type: web
    name: medsync-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./medsync.db
      - key: SECRET_KEY
        generateValue: true
